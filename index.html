<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Book Viewer</title>
    <meta name="description" content="Visor interactivo 3D de libros con carrusel y rotación por arrastre">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="carousel-viewport" id="carouselViewport">
        <div class="carousel-track" id="carouselTrack">
        </div>
    </div>
    <div class="book-info" id="bookInfo">
        <h2 class="book-info-title" id="bookInfoTitle"></h2>
        <p class="book-info-author" id="bookInfoAuthor"></p>
    </div>
    <div class="floating-action" id="floatingAction">
        <button class="fab" id="fabBtn" aria-label="Ver detalles del libro">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
            <span>Ver Detalles</span>
        </button>
    </div>
    <div class="bottom-bar">
        <div class="controls-group controls-left">
            <button class="ctrl-btn" id="resetBtn" title="Resetear vista (R)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
                <span>Resetear</span>
            </button>
        </div>
        <nav class="book-nav" id="bookNav">
            <button class="nav-arrow" id="prevBook" aria-label="Libro anterior">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <div class="nav-dots" id="navDots"></div>
            <button class="nav-arrow" id="nextBook" aria-label="Siguiente libro">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </button>
        </nav>
        <div class="controls-group controls-right">
            <button class="ctrl-btn" id="autoRotateBtn" title="Auto-rotar (Espacio)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                    <polyline points="21 3 21 9 15 9" />
                </svg>
                <span>Auto-Rotar</span>
            </button>
            <button class="ctrl-btn" id="flipBtn" title="Voltear (F)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                </svg>
                <span>Voltear</span>
            </button>
        </div>
    </div>
    <div class="details-overlay" id="detailsOverlay">
        <div class="details-backdrop" id="detailsBackdrop"></div>
        <div class="details-panel" id="detailsPanel">
            <button class="close-btn" id="closeBtn" aria-label="Cerrar detalles">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <div id="detailsPanelContent">
            </div>
        </div>
    </div>
    <div class="toast" id="toast">
        <span>↕ Scroll para navegar entre libros · Arrastra para rotar</span>
    </div>
    <script src="script.js"></script>
</body>

</html>
